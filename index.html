<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Technician Portal Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #e0f0ff, #f8faff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-card {
        background: white;
        padding: 2rem 3rem;
        border-radius: 12px;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 320px;
      }

      .login-icon {
        font-size: 40px;
        background: #3b82f6;
        color: white;
        width: 60px;
        height: 60px;
        line-height: 60px;
        border-radius: 50%;
        margin: 0 auto 1rem;
      }

      label {
        display: block;
        text-align: left;
        font-weight: 600;
        margin-top: 1rem;
      }

      input {
        width: 100%;
        padding: 10px;
        margin-top: 0.5rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
      }

      button {
        margin-top: 1.5rem;
        background: #ff007f;
        color: white;
        border: none;
        padding: 10px;
        border-radius: 8px;
        width: 100%;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background: #e60073;
      }

      .error {
        color: red;
        font-size: 13px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <div class="login-icon">👤</div>
        <h2>Technician Portal</h2>
        <p>Sign in to access delivery tools</p>

        <form id="loginForm">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
          />

          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />

          <button type="submit">Sign In</button>
        </form>

        <p id="error" class="error"></p>
      </div>
    </div>

    <script>
      // ══════════════════════════════════════════
      // CONFIG
      // ══════════════════════════════════════════
      // Authentication is performed server-side by the Google Apps Script proxy,
      // which validates credentials and returns a session token. No user list or
      // password logic lives in the browser. See DEPLOYMENT.md.
      const PROXY_URL =
        "https://script.google.com/macros/s/AKfycbw-cds97puXTEUzwsJB8va5TJKHrlvn1bhsv9qtCakQURzzCNGqzpxDhqvdA_n3Na1x/exec";

      const loginForm = document.getElementById("loginForm");
      const error = document.getElementById("error");
      const submitBtn = loginForm.querySelector("button[type='submit']");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (!username || !password) {
          error.textContent = "Please enter your username and password.";
          return;
        }

        error.textContent = "";
        const originalLabel = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = "Signing in...";

        try {
          // Sent as text/plain to avoid a CORS preflight against Apps Script.
          const res = await fetch(PROXY_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", username, password }),
          });
          const data = await res.json();
          if (!res.ok || !data || data.result !== "success" || !data.user) {
            throw new Error(
              (data && data.error) || "Invalid login. Please try again.",
            );
          }

          localStorage.setItem(
            "loggedInUser",
            JSON.stringify({
              id: data.user.id,
              login: data.user.login,
              fullName: data.user.fullName,
              token: data.token,
            }),
          );
          window.location.href = "Confirmation.html";
        } catch (err) {
          error.textContent =
            err.message || "Login failed. Please check your connection.";
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = originalLabel;
        }
      });
    </script>
  </body>
</html>
