<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delivery Confirmation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
  <style>
    :root {
      --primary: #e80074;
      --primary-dark: #c4005f;
      --primary-glow: rgba(232, 0, 116, 0.15);
      --border: #e8e8e8;
      --bg: #f4f4f6;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #777;
      --success: #00b86b;
      --danger: #e84040;
      --radius: 12px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px 60px;
      color: var(--text);
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    /* ── HEADER ── */
    .app-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .app-header .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .app-header .logo-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--primary);
      display: inline-block;
    }
    .app-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .app-header p {
      font-size: 0.875rem;
      color: var(--muted);
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 16px;
    }

    /* ── SEARCH ── */
    .search-wrapper {
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #searchBar {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    #searchBar:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    #searchBar::placeholder { color: #bbb; }

    /* ── CUSTOMER LIST ── */
    #customerList {
      margin-top: 16px;
      max-height: 420px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #customerList::-webkit-scrollbar { width: 4px; }
    #customerList::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    .customer-card {
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .customer-card:hover {
      border-color: var(--primary);
      background: #fff8fb;
      transform: translateX(2px);
    }
    .customer-card:active { transform: scale(0.99); }
    .customer-name { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
    .customer-id {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }
    .customer-arrow { color: var(--primary); opacity: 0.5; }

    .no-results {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 24px 0;
    }

    .loading-state {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 24px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ── SPINNER ── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SECTION LABELS ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── SELECTED CUSTOMER BANNER ── */
    .customer-banner {
      background: linear-gradient(135deg, #fff0f7 0%, #fff8fb 100%);
      border: 1.5px solid #f9c0da;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .customer-banner-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px;
      flex-shrink: 0;
    }
    .customer-banner-name { font-weight: 600; font-size: 15px; }
    .customer-banner-id {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    /* ── FORM FIELDS ── */
    .field-group { margin-bottom: 18px; }
    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      display: block;
    }
    .field-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-input:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .field-input[readonly] {
      background: #f0f0f0;
      color: var(--muted);
      cursor: default;
    }

    /* ── SCAN / PHOTO BUTTONS ── */
    .action-btn {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .scan-btn {
      border: 1.5px dashed var(--border);
      background: #fafafa;
      color: var(--muted);
    }
    .scan-btn:hover { border-color: var(--primary); color: var(--primary); background: #fff8fb; }

    .photo-btn {
      border: 1.5px solid var(--border);
      background: #fafafa;
      color: var(--text);
    }
    .photo-btn:hover { border-color: var(--primary); background: #fff8fb; }

    .photo-preview {
      width: 100%;
      border-radius: 10px;
      object-fit: cover;
      border: 1.5px solid var(--border);
      display: none;
      margin-top: 8px;
      max-height: 200px;
    }
    .photo-preview.has-image { display: block; }
    .hidden-file-input { display: none; }

    /* ── SIGNATURE ── */
    .sig-wrapper {
      position: relative;
      width: 100%;
      height: 180px;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      background: #fafafa;
      overflow: hidden;
    }
    .sig-placeholder {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px;
      color: #ccc;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #signature-canvas {
      position: absolute; left: 0; top: 0;
      width: 100%; height: 100%;
      cursor: crosshair;
    }
    .clear-sig-btn {
      width: 100%;
      padding: 10px;
      background: #f4f4f6;
      color: var(--muted);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .clear-sig-btn:hover { background: #ebebeb; }

    /* ── SUBMIT BUTTON ── */
    .submit-btn {
      width: 100%;
      padding: 16px;
      margin-top: 8px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(232,0,116,0.3);
    }
    .submit-btn:hover { background: var(--primary-dark); box-shadow: 0 6px 20px rgba(232,0,116,0.4); }
    .submit-btn:active { transform: scale(0.99); }
    .submit-btn:disabled {
      background: #ddd;
      color: #aaa;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* ── SECONDARY LINKS ── */
    .text-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .text-link:hover { text-decoration: underline; }
    .logout-link {
      display: block;
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    .logout-link:hover { text-decoration: underline; }

    /* ── HISTORY BUTTON ── */
    .history-btn {
      width: 100%;
      padding: 11px;
      margin-top: 12px;
      background: #f4f4f6;
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
    }
    .history-btn:hover { background: #ebebeb; border-color: #ccc; }

    /* ── SCANNER OVERLAY ── */
    #scanner-container {
      display: none;
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      justify-content: center; align-items: center;
    }
    .scanner-box {
      width: 90%; max-width: 400px;
      background: white;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    #qr-reader { width: 100%; border-radius: 8px; overflow: hidden; }
    .cancel-scan-btn {
      width: 100%; padding: 12px; margin-top: 12px;
      background: var(--danger);
      color: white; border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      cursor: pointer;
    }

    /* ── MODAL ── */
    .modal {
      display: none;
      position: fixed; z-index: 2000;
      left: 0; top: 0; width: 100%; height: 100%;
      overflow: auto;
      background: rgba(0,0,0,0.5);
    }
    .modal-content {
      background: white;
      margin: 5% auto;
      padding: 24px;
      border-radius: var(--radius);
      width: 90%; max-width: 800px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .close-btn {
      background: none; border: none;
      font-size: 24px; cursor: pointer; color: var(--muted);
      line-height: 1;
    }
    .close-btn:hover { color: var(--text); }
    #history-table-container { max-height: 60vh; overflow-y: auto; }
    #history-table {
      width: 100%; border-collapse: collapse; margin-top: 8px;
      font-size: 13px;
    }
    #history-table th {
      background: #f4f4f6;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      position: sticky; top: 0;
      border-bottom: 1px solid var(--border);
    }
    #history-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      word-break: break-word;
    }
    #history-table tr:last-child td { border-bottom: none; }
    #history-table tr:hover td { background: #fafafa; }

    /* ── VIEWS ── */
    #assignmentView { display: none; }

    /* ── DIVIDER ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      body { padding: 20px 12px 50px; }
      .card { padding: 20px; }
      .modal-content { padding: 16px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- ══════════════ SEARCH VIEW ══════════════ -->
  <div id="searchView">
    <div class="app-header">
      <div class="brand">
        <span class="logo-dot"></span>
        <h1>Delivery Confirmation</h1>
      </div>
      <p>Search customer by name or ID</p>
    </div>

    <div class="card">
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
        </svg>
        <input type="text" id="searchBar" placeholder="Search name or customer ID...">
      </div>
      <div id="customerList">
        <div class="loading-state">
          <span class="spinner"></span> Loading customers...
        </div>
      </div>
    </div>

    <button id="viewHistoryBtn" class="history-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/>
        <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/>
      </svg>
      View My Delivery History
    </button>
    <a href="#" id="logout-link-search" class="logout-link">Logout</a>
  </div>

  <!-- ══════════════ ASSIGNMENT VIEW ══════════════ -->
  <div id="assignmentView">
    <div class="app-header">
      <div class="brand">
        <span class="logo-dot"></span>
        <h1>Delivery Confirmation</h1>
      </div>
      <p>Assign devices and capture proof</p>
    </div>

    <div class="card">
      <p class="section-label">Selected Customer</p>
      <div id="selectedCustomerInfo"></div>

      <hr class="divider">

      <!-- Agent -->
      <div class="field-group">
        <label class="field-label">Agent Name</label>
        <input type="text" id="agent-name-input" class="field-input" placeholder="Agent name..." readonly>
      </div>

      <!-- Router -->
      <div class="field-group">
        <label class="field-label">Router</label>
        <button type="button" class="action-btn scan-btn" data-target="router-input">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
            <path d="M0 .5A.5.5 0 0 1 .5 0h3a.5.5 0 0 1 0 1H1v2.5a.5.5 0 0 1-1 0v-3zm12 0a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-1 0V1h-2.5a.5.5 0 0 1-.5-.5zM.5 12a.5.5 0 0 1 .5.5V15h2.5a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5v-3a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1 0-1H15v-2.5a.5.5 0 0 1 .5-.5zM4 4h1v1H4V4zm2 0h1v1H6V4zm2 0h1v1H8V4zM4 6h1v1H4V6zm2 0h1v1H6V6zm2 0h1v1H8V6zM4 8h1v1H4V8zm2 0h1v1H6V8zm2 0h1v1H8V8z"/>
          </svg>
          Scan Router QR Code
        </button>
        <input type="text" id="router-input" class="field-input" placeholder="Or enter router barcode manually...">
      </div>

      <!-- SIM -->
      <div class="field-group">
        <label class="field-label">SIM Card</label>
        <button type="button" class="action-btn scan-btn" data-target="sim-input">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
            <path d="M0 .5A.5.5 0 0 1 .5 0h3a.5.5 0 0 1 0 1H1v2.5a.5.5 0 0 1-1 0v-3zm12 0a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-1 0V1h-2.5a.5.5 0 0 1-.5-.5zM.5 12a.5.5 0 0 1 .5.5V15h2.5a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5v-3a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1 0-1H15v-2.5a.5.5 0 0 1 .5-.5zM4 4h1v1H4V4zm2 0h1v1H6V4zm2 0h1v1H8V4zM4 6h1v1H4V6zm2 0h1v1H6V6zm2 0h1v1H8V6zM4 8h1v1H4V8zm2 0h1v1H6V8zm2 0h1v1H8V8z"/>
          </svg>
          Scan SIM QR Code
        </button>
        <input type="text" id="sim-input" class="field-input" placeholder="Or enter SIM barcode manually...">
      </div>

      <hr class="divider">

      <!-- ID Photo -->
      <div class="field-group">
        <label class="field-label">ID Photo</label>
        <button type="button" class="action-btn photo-btn" data-target="id-photo-input">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
            <path d="M15 12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h1.172a3 3 0 0 0 2.12-.879l.83-.828A1 1 0 0 1 6.827 3h2.344a1 1 0 0 1 .707.293l.828.828A3 3 0 0 0 12.828 5H14a1 1 0 0 1 1 1v6zM2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2z"/>
            <path d="M8 11a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5zm0 1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
          </svg>
          Take Photo of ID
        </button>
        <img id="id-photo-preview" class="photo-preview" alt="ID Photo">
        <input type="file" id="id-photo-input" class="hidden-file-input" accept="image/*" capture="environment">
      </div>

      <!-- Premises Photo -->
      <div class="field-group">
        <label class="field-label">Customer Premises Photo</label>
        <button type="button" class="action-btn photo-btn" data-target="premises-photo-input">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="currentColor" viewBox="0 0 16 16">
            <path d="M15 12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h1.172a3 3 0 0 0 2.12-.879l.83-.828A1 1 0 0 1 6.827 3h2.344a1 1 0 0 1 .707.293l.828.828A3 3 0 0 0 12.828 5H14a1 1 0 0 1 1 1v6zM2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4H2z"/>
            <path d="M8 11a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5zm0 1a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
          </svg>
          Take Photo of Premises
        </button>
        <img id="premises-photo-preview" class="photo-preview" alt="Premises Photo">
        <input type="file" id="premises-photo-input" class="hidden-file-input" accept="image/*" capture="environment">
      </div>

      <hr class="divider">

      <!-- Signature -->
      <div class="field-group">
        <label class="field-label">Customer Signature</label>
        <div class="sig-wrapper">
          <span class="sig-placeholder" id="sig-placeholder">Sign here</span>
          <canvas id="signature-canvas"></canvas>
        </div>
        <button type="button" class="clear-sig-btn" id="clear-signature-btn">Clear Signature</button>
      </div>

      <button id="submit-button" class="submit-btn">Confirm Delivery</button>
    </div>

    <a href="#" id="backToSearch" class="text-link">← Search for another customer</a>
    <a href="#" id="logout-link-assign" class="logout-link">Logout</a>
  </div>

</div>

<!-- ══════════════ SCANNER OVERLAY ══════════════ -->
<div id="scanner-container">
  <div class="scanner-box">
    <div id="qr-reader"></div>
    <button id="cancel-scan" class="cancel-scan-btn">Cancel</button>
  </div>
</div>

<!-- ══════════════ HISTORY MODAL ══════════════ -->
<div id="historyModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>My Delivery History</h2>
      <button class="close-btn" id="closeModalBtn">&times;</button>
    </div>
    <div id="history-table-container">
      <table id="history-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Customer</th>
            <th>Router</th>
            <th>SIM</th>
          </tr>
        </thead>
        <tbody id="history-table-body"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ══════════════════════════════════════════
  // CONFIG — replace with your Apps Script URL
  // ══════════════════════════════════════════
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyjcTM-qpwKeGjw3ArLrsFkJS9E0zO10NuGuh9lIw8zorpD1Y8wju0sTS-J-j34ve2Nnw/exec';

  const HISTORY_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRKPA6yfqgouD1JkUY-LwtTDMpNXxQb8s9KpuRyCpEbPVv1dZXnoUjaiWYi5rWXjz_0U_HcfPo72P8Q/pub?gid=2140533495&single=true&output=csv';

  const PORTAL_AUTH = "Basic MWY3M2M4ODUzY2FiYzg3ZTI0MjIyOWE5NDU1NDg4MDE6MWU2MTM4NzAwMjA0MjlmNjM3NzRjYmYwZjU5ZGIxMTY=";

  // ══════════════════════════════════════════
  // AUTH
  // ══════════════════════════════════════════
  let loggedInUser = null;

  function handleLogout() {
    localStorage.removeItem('loggedInUser');
    window.location.href = 'login.html';
  }

  // ══════════════════════════════════════════
  // DOM REFS
  // ══════════════════════════════════════════
  const dom = {
    searchView: document.getElementById('searchView'),
    assignmentView: document.getElementById('assignmentView'),
    searchBar: document.getElementById('searchBar'),
    customerList: document.getElementById('customerList'),
    selectedCustomerInfo: document.getElementById('selectedCustomerInfo'),
    backToSearchLink: document.getElementById('backToSearch'),
    scannerContainer: document.getElementById('scanner-container'),
    cancelScanBtn: document.getElementById('cancel-scan'),
    signatureCanvas: document.getElementById('signature-canvas'),
    clearSignatureBtn: document.getElementById('clear-signature-btn'),
    submitBtn: document.getElementById('submit-button'),
    idPhotoInput: document.getElementById('id-photo-input'),
    premisesPhotoInput: document.getElementById('premises-photo-input'),
    agentNameInput: document.getElementById('agent-name-input'),
    routerInput: document.getElementById('router-input'),
    simInput: document.getElementById('sim-input'),
    sigPlaceholder: document.getElementById('sig-placeholder'),
    historyModal: document.getElementById('historyModal'),
    historyTableBody: document.getElementById('history-table-body'),
    closeModalBtn: document.getElementById('closeModalBtn'),
    viewHistoryBtn: document.getElementById('viewHistoryBtn')
  };

  let allCustomers = [];
  let selectedCustomer = null;
  let signaturePad = null;
  let currentScanTargetId = null;

  // ══════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════
  window.addEventListener('DOMContentLoaded', () => {
    const stored = localStorage.getItem('loggedInUser');
    if (!stored) {
      window.location.href = 'login.html';
      return;
    }
    loggedInUser = JSON.parse(stored);
    if (loggedInUser.fullName) dom.agentNameInput.value = loggedInUser.fullName;

    document.getElementById('logout-link-search').addEventListener('click', handleLogout);
    document.getElementById('logout-link-assign').addEventListener('click', handleLogout);
    dom.viewHistoryBtn.addEventListener('click', showDeliveryHistory);
    dom.closeModalBtn.addEventListener('click', () => { dom.historyModal.style.display = 'none'; });
    window.addEventListener('click', e => { if (e.target === dom.historyModal) dom.historyModal.style.display = 'none'; });

    loadCustomers();
  });

  // ══════════════════════════════════════════
  // LOAD CUSTOMERS — direct from Splynx via Apps Script doGet
  // ══════════════════════════════════════════
  async function loadCustomers() {
    dom.customerList.innerHTML = '<div class="loading-state"><span class="spinner"></span> Loading customers...</div>';
    try {
      const res = await fetch(APPS_SCRIPT_URL);
      if (!res.ok) throw new Error('Failed to load customers');
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      allCustomers = data;
      dom.customerList.innerHTML = '';
      // Show prompt to start typing
      dom.customerList.innerHTML = '<p class="no-results">Start typing to search customers</p>';
    } catch (err) {
      dom.customerList.innerHTML = '<p class="no-results">Error loading customers. Please refresh.</p>';
      console.error(err);
    }
  }

  // ══════════════════════════════════════════
  // SEARCH & DISPLAY
  // ══════════════════════════════════════════
  dom.searchBar.addEventListener('input', e => {
    const query = e.target.value.toLowerCase().trim();
    if (!query) {
      dom.customerList.innerHTML = '<p class="no-results">Start typing to search customers</p>';
      return;
    }
    const filtered = allCustomers.filter(c =>
      (c.name && c.name.toLowerCase().includes(query)) ||
      (c.id && c.id.toString().toLowerCase().includes(query))
    );
    renderCustomerList(filtered);
  });

  function renderCustomerList(list) {
    if (list.length === 0) {
      dom.customerList.innerHTML = '<p class="no-results">No customers found.</p>';
      return;
    }
    dom.customerList.innerHTML = list.slice(0, 50).map(c => `
      <div class="customer-card" data-id="${c.id}">
        <div>
          <div class="customer-name">${c.name || 'Unknown'}</div>
          <div class="customer-id">#${c.id || 'N/A'}</div>
        </div>
        <svg class="customer-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/>
        </svg>
      </div>
    `).join('');

    dom.customerList.querySelectorAll('.customer-card').forEach(card => {
      card.addEventListener('click', () => {
        const customer = allCustomers.find(c => c.id == card.dataset.id);
        if (customer) selectCustomer(customer);
      });
    });
  }

  // ══════════════════════════════════════════
  // SELECT CUSTOMER
  // ══════════════════════════════════════════
  function selectCustomer(customer) {
    selectedCustomer = customer;
    const initials = (customer.name || '?').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
    dom.selectedCustomerInfo.innerHTML = `
      <div class="customer-banner">
        <div class="customer-banner-avatar">${initials}</div>
        <div>
          <div class="customer-banner-name">${customer.name}</div>
          <div class="customer-banner-id">ID: #${customer.id}</div>
        </div>
      </div>
    `;
    dom.searchView.style.display = 'none';
    dom.assignmentView.style.display = 'block';
    if (!signaturePad) {
      signaturePad = new SignaturePad(dom.signatureCanvas, { backgroundColor: 'white' });
      signaturePad.addEventListener('beginStroke', () => {
        dom.sigPlaceholder.style.opacity = '0';
      });
    }
    resizeCanvas();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ══════════════════════════════════════════
  // SIGNATURE PAD
  // ══════════════════════════════════════════
  function resizeCanvas() {
    const ratio = Math.max(window.devicePixelRatio || 1, 1);
    const canvas = dom.signatureCanvas;
    const data = signaturePad ? signaturePad.toData() : null;
    canvas.width = canvas.offsetWidth * ratio;
    canvas.height = canvas.offsetHeight * ratio;
    canvas.getContext('2d').scale(ratio, ratio);
    if (signaturePad) {
      signaturePad.clear();
      if (data && data.length) signaturePad.fromData(data);
    }
  }

  dom.clearSignatureBtn.addEventListener('click', () => {
    if (signaturePad) signaturePad.clear();
    dom.sigPlaceholder.style.opacity = '1';
  });

  window.addEventListener('resize', resizeCanvas);

  // ══════════════════════════════════════════
  // QR SCANNER
  // ══════════════════════════════════════════
  const html5QrCode = new Html5Qrcode('qr-reader');

  function startScanner(targetInputId) {
    currentScanTargetId = targetInputId;
    dom.scannerContainer.style.display = 'flex';
    html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 250 } },
      (decodedText) => {
        if (currentScanTargetId) document.getElementById(currentScanTargetId).value = decodedText;
        stopScanner();
      },
      () => {}
    ).catch(() => { alert('Could not start camera scanner.'); stopScanner(); });
  }

  function stopScanner() {
    html5QrCode.stop().catch(() => {}).finally(() => {
      dom.scannerContainer.style.display = 'none';
      currentScanTargetId = null;
    });
  }

  dom.cancelScanBtn.addEventListener('click', stopScanner);

  document.querySelectorAll('.scan-btn[data-target]').forEach(btn =>
    btn.addEventListener('click', () => startScanner(btn.dataset.target))
  );

  // ══════════════════════════════════════════
  // PHOTO CAPTURE
  // ══════════════════════════════════════════
  document.querySelectorAll('.photo-btn[data-target]').forEach(btn =>
    btn.addEventListener('click', () => document.getElementById(btn.dataset.target).click())
  );

  document.querySelectorAll("input[type='file']").forEach(input => {
    input.addEventListener('change', e => {
      const previewId = e.target.id.replace('-input', '-preview');
      const img = document.getElementById(previewId);
      if (e.target.files[0]) {
        img.src = URL.createObjectURL(e.target.files[0]);
        img.classList.add('has-image');
      }
    });
  });

  // ══════════════════════════════════════════
  // BACK TO SEARCH
  // ══════════════════════════════════════════
  dom.backToSearchLink.addEventListener('click', e => {
    e.preventDefault();
    dom.assignmentView.style.display = 'none';
    dom.searchView.style.display = 'block';
    dom.routerInput.value = '';
    dom.simInput.value = '';
    dom.idPhotoInput.value = '';
    dom.premisesPhotoInput.value = '';
    document.getElementById('id-photo-preview').classList.remove('has-image');
    document.getElementById('premises-photo-preview').classList.remove('has-image');
    if (signaturePad) signaturePad.clear();
    dom.sigPlaceholder.style.opacity = '1';
    selectedCustomer = null;
  });

  // ══════════════════════════════════════════
  // FILE HELPER
  // ══════════════════════════════════════════
  function dataURLtoFile(dataurl, filename) {
    const arr = dataurl.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while (n--) u8arr[n] = bstr.charCodeAt(n);
    return new File([u8arr], filename, { type: mime });
  }

  // ══════════════════════════════════════════
  // SUBMIT DELIVERY
  // ══════════════════════════════════════════
  dom.submitBtn.addEventListener('click', submitDelivery);

  async function submitDelivery() {
    if (!selectedCustomer || !dom.routerInput.value || !dom.simInput.value || !dom.agentNameInput.value) {
      alert('Please fill in Customer, Agent, Router, and SIM card details.');
      return;
    }
    if (signaturePad.isEmpty()) {
      alert('Please provide a customer signature.');
      return;
    }

    dom.submitBtn.disabled = true;
    dom.submitBtn.textContent = 'Submitting...';

    try {
      // 1. Upload files to portal
      const idPhotoFile = dom.idPhotoInput.files[0];
      const premisesPhotoFile = dom.premisesPhotoInput.files[0];
      const signatureFile = dataURLtoFile(signaturePad.toDataURL('image/png'), 'signature.png');

      const filesToUpload = [
        { file: idPhotoFile, title: 'ID Copy', description: 'Customer ID Copy' },
        { file: premisesPhotoFile, title: 'Customer Premises Photo', description: 'Photo of installation site' },
        { file: signatureFile, title: 'Signature', description: 'Customer Signature' }
      ];

      for (const item of filesToUpload) {
        if (!item.file) continue;
        const createRes = await fetch(
          'https://portal.umoja.network/api/2.0/admin/customers/customer-documents',
          {
            method: 'POST',
            headers: { 'Authorization': PORTAL_AUTH, 'Content-Type': 'application/json' },
            body: JSON.stringify({
              customer_id: selectedCustomer.id,
              type: 'uploaded',
              title: item.title,
              description: item.description,
              visible_by_customer: '0'
            })
          }
        );
        if (!createRes.ok) throw new Error(`Failed to create document: ${item.title}`);
        const createdDoc = await createRes.json();
        const formData = new FormData();
        formData.append('file', item.file);
        const uploadRes = await fetch(
          `https://portal.umoja.network/api/2.0/admin/customers/customer-documents/${createdDoc.id}--upload`,
          { method: 'POST', headers: { 'Authorization': PORTAL_AUTH }, body: formData }
        );
        if (!uploadRes.ok) throw new Error(`Failed to upload: ${item.title}`);
      }

      // 2. Send data to Google Sheet via Apps Script POST
      const sheetFormData = new FormData();
      sheetFormData.append('Customer ID', selectedCustomer.id);
      sheetFormData.append('Name', selectedCustomer.name);
      sheetFormData.append('Router Barcode', dom.routerInput.value);
      sheetFormData.append('SIM Barcode', dom.simInput.value);
      sheetFormData.append('Agent', dom.agentNameInput.value);

      const sheetRes = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: sheetFormData });
      const sheetResult = await sheetRes.json();
      if (sheetResult.result !== 'success') throw new Error('Data saved to portal but failed to log to Google Sheet.');

      alert('✅ Delivery confirmed and all data saved successfully!');
      dom.backToSearchLink.click();

    } catch (error) {
      console.error(error);
      alert('❌ Error: ' + error.message);
    } finally {
      dom.submitBtn.disabled = false;
      dom.submitBtn.textContent = 'Confirm Delivery';
    }
  }

  // ══════════════════════════════════════════
  // DELIVERY HISTORY
  // ══════════════════════════════════════════
  async function showDeliveryHistory() {
    if (!loggedInUser) { alert('Could not identify agent.'); return; }
    dom.historyTableBody.innerHTML = '<tr><td colspan="4"><div class="loading-state"><span class="spinner"></span> Loading...</div></td></tr>';
    dom.historyModal.style.display = 'block';

    try {
      const url = `${HISTORY_CSV_URL}&t=${new Date().getTime()}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('Network error');
      const csvText = await res.text();
      const rows = csvText.split(/\r?\n/).slice(1);
      const agentName = loggedInUser.fullName;
      let html = '';

      rows.reverse().forEach(rowText => {
        if (!rowText) return;
        const cols = rowText.split(',');
        if ((cols[5] || '').trim() === agentName) {
          html += `<tr>
            <td>${(cols[0] || '').trim()}</td>
            <td>${(cols[2] || '').trim()}</td>
            <td>${(cols[3] || '').trim()}</td>
            <td>${(cols[4] || '').trim()}</td>
          </tr>`;
        }
      });

      dom.historyTableBody.innerHTML = html || '<tr><td colspan="4" style="text-align:center;color:#999;padding:20px">No delivery history found.</td></tr>';
    } catch (err) {
      console.error(err);
      dom.historyTableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#e84040;padding:20px">Failed to load history.</td></tr>';
    }
  }
</script>
</body>
</html>
